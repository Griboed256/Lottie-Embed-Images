name: Build and Release Lottie Embed Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: v1.2.6)'
        required: true
        default: 'v1.2.6'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install Pillow pillow-avif-plugin tkinterdnd2 pyinstaller
      - run: pyinstaller --windowed --onefile --name Lottie_Embed_Images_Windows lottie_embed_images.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Lottie_Embed_Images_Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install Pillow pillow-avif-plugin tkinterdnd2 pyinstaller
      # Устанавливаем утилиту для создания DMG через Homebrew
      - name: Install create-dmg
        run: brew install create-dmg
      - run: pyinstaller --windowed --name Lottie_Embed_Images lottie_embed_images.py
      # Создаем DMG образ
      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          create-dmg \
            --volname "Lottie Embed Images" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Lottie_Embed_Images.app" 175 190 \
            --hide-extension "Lottie_Embed_Images.app" \
            --app-drop-link 425 190 \
            "dist/Lottie_Embed_Images_macOS.dmg" \
            "dist/Lottie_Embed_Images.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Lottie_Embed_Images_macOS.dmg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: true
          files: |
            artifacts/Lottie_Embed_Images_Windows.exe
            artifacts/Lottie_Embed_Images_macOS.dmg
