name: Build and Release Lottie Embed Images

# Наша новая "Волшебная кнопка" для запуска руками
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: v1.2.0)'
        required: true
        default: 'v1.2.0'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow tkinterdnd2 pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --windowed --onefile --name Lottie_Embed_Images_Windows lottie_embed_images.py

      - name: Build with PyInstaller (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --windowed --name Lottie_Embed_Images lottie_embed_images.py
          cd dist
          zip -r ../Lottie_Embed_Images_macOS.zip Lottie_Embed_Images.app

      # Робот САМ создает релиз и кладет туда Windows файл
      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: dist/Lottie_Embed_Images_Windows.exe

      # Робот САМ создает релиз и кладет туда macOS файл
      - name: Upload Release Asset (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: Lottie_Embed_Images_macOS.zip
